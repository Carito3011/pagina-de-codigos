<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Mi Biblioteca</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Estilos específicos para que el formulario se vea increíble */
        .registro-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            background-color: #1f1f1f;
            border: 1px solid #333;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #161616;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box; /* Para que no se salga del contenedor */
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #007bff;
            outline: none;
        }

        .mensaje-error {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="registro-container">
        <h2>Crear Cuenta</h2>
        <p>Regístrate para ver los códigos completos de Mario y CSS.</p>

        <div class="input-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" id="username" class="input-field" placeholder="Ej: MarioPlayer99">
        </div>

        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" class="input-field" placeholder="tu@correo.com">
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••">
        </div>

        <p id="error" class="mensaje-error">Por favor, completa todos los campos correctamente.</p>

        <button class="btn" onclick="ejecutarRegistro()" style="width: 100%;">Crear Cuenta Gratis</button>

        <p style="margin-top: 20px; font-size: 0.85rem; color: #777;">
            Al registrarte, tus datos se guardarán localmente en este navegador.
        </p>
    </div>

    <script>
        function ejecutarRegistro() {
            // 1. Obtenemos los valores de los inputs
            const user = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error');

            // 2. Validación simple
            if (user.trim() === "" || email.trim() === "" || pass.trim() === "") {
                errorMsg.style.display = "block";
                return;
            }

            // 3. Creamos el objeto con los datos
            const usuarioGlobal = {
                nombre: user,
                correo: email,
                contrasena: pass,
                fechaRegistro: new Date().toLocaleDateString()
            };

            // 4. GUARDAR EN EL "ALGO" (LocalStorage)
            // Guardamos el objeto convertido a texto (JSON)
            localStorage.setItem('perfilUsuario', JSON.stringify(usuarioGlobal));
            
            // También guardamos el estado de "registrado" para el muro de bloqueo
            localStorage.setItem('registrado', 'true');

            // 5. Feedback y Redirección
            alert("¡Bienvenido/a, " + user + "! Tu cuenta ha sido creada.");
            window.location.href = 'index2.html'; // Te manda a la principal
        }
    </script>

</body>
</html>
