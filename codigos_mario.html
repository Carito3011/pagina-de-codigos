<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Código del Juego de Mario</h1>
    <div id="contenido-bloqueado">
        <p>Debes estar registrado para ver esto.</p>
        <a href="login.html" class="btn">Ir a Registro</a>
    </div>

    <div id="codigo-secreto" style="display:none;">
        <pre><code>
// Aquí va tu código de Mario...
function Mario() {
    this.x = 50;
    this.y = 200;
    // etc...
}
        </code></pre>
    </div>

    <script>
        if(localStorage.getItem('registrado') === 'true') {
            document.getElementById('contenido-bloqueado').style.display = 'none';
            document.getElementById('codigo-secreto').style.display = 'block';
        }
    </script>
</body>
</html>
